<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StorageBase64 - Neo-Anime Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --anime-bg: #0b0e14;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--anime-bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(188, 19, 254, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.05) 0%, transparent 40%);
        }

        .tech-font { font-family: 'Rajdhani', sans-serif; }

        .anime-card {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .anime-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, var(--neon-purple), var(--neon-cyan));
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 10px;
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .btn-neon-purple {
            background: linear-gradient(135deg, #7e22ce 0%, #bc13fe 100%);
            transition: all 0.3s ease;
        }
        .btn-neon-purple:hover {
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.6);
            transform: translateY(-1px);
        }

        .cmd-display {
            background: #000;
            color: var(--neon-cyan);
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: 'ui-monospace', monospace;
            font-size: 0.8rem;
            border-left: 4px solid var(--neon-cyan);
        }

        input[type="checkbox"] {
            accent-color: var(--neon-cyan);
        }
    </style>
</head>
<body class="min-h-screen text-slate-300 selection:bg-cyan-900 selection:text-white">

    <div class="max-w-3xl mx-auto py-12 px-6">
        <!-- Header -->
        <header class="mb-12 border-b border-slate-800 pb-6 relative text-left">
            <div class="absolute -top-4 -left-4 w-12 h-12 bg-cyan-500/10 blur-xl rounded-full"></div>
            <h1 class="text-5xl font-black tech-font tracking-tighter text-white neon-text italic">
                StorageBase64
            </h1>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.5em] mt-2 ml-1">High-Frequency Media Transcoder</p>
        </header>

        <div class="space-y-8">
            
            <!-- ENCODER -->
            <section class="anime-card rounded-2xl p-8">
                <div class="flex items-center gap-4 mb-8">
                    <div class="h-1 bg-cyan-400 w-8"></div>
                    <h2 class="text-lg font-bold tech-font uppercase tracking-widest text-white">Input Interface</h2>
                </div>
                
                <!-- FFmpeg Commands -->
                <div class="mb-8 bg-black/40 p-5 rounded-xl border border-white/5">
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-[10px] font-black text-purple-400 uppercase tracking-widest">FFmpeg Command Lab</span>
                        <div class="h-1 w-12 bg-purple-500/30 rounded"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <button onclick="generateCmd('av1')" class="bg-slate-800/50 hover:bg-slate-800 text-cyan-400 text-[10px] font-bold py-2 px-4 rounded-md border border-cyan-500/30 transition-all uppercase tracking-wider">
                            Sync AV1
                        </button>
                        <button onclick="generateCmd('hevc')" class="bg-slate-800/50 hover:bg-slate-800 text-purple-400 text-[10px] font-bold py-2 px-4 rounded-md border border-purple-500/30 transition-all uppercase tracking-wider">
                            Sync HEVC
                        </button>
                    </div>
                    <div id="cmdDisplay" class="cmd-display hidden animate-pulse"></div>
                </div>

                <!-- Settings -->
                <div class="space-y-6">
                    <div class="flex gap-4">
                        <label class="flex-1 flex items-center gap-3 cursor-pointer p-3 rounded-lg bg-white/5 hover:bg-white/10 transition-all border border-white/5">
                            <input type="checkbox" id="optimizeImage" checked>
                            <span class="text-[11px] font-bold text-slate-400 uppercase">WebP Core</span>
                        </label>
                        <label class="flex-1 flex items-center gap-3 cursor-pointer p-3 rounded-lg bg-white/5 hover:bg-white/10 transition-all border border-white/5">
                            <input type="checkbox" id="simulateHevc">
                            <span class="text-[11px] font-bold text-slate-400 uppercase">Advanced Bitrate</span>
                        </label>
                    </div>

                    <div class="relative">
                        <input type="file" id="mediaFile" accept="video/*,image/*" 
                            class="block w-full text-[11px] text-slate-500 file:mr-4 file:py-2 file:px-6 file:rounded file:border-0 file:text-[10px] file:font-black file:uppercase file:bg-cyan-500 file:text-black hover:file:bg-cyan-400 cursor-pointer transition-all bg-black/30 rounded-lg border border-white/10 p-2"/>
                    </div>
                </div>

                <div id="encoderStatus" class="hidden my-6 p-3 bg-cyan-900/30 border border-cyan-500/50 text-cyan-400 rounded-lg text-[10px] font-bold flex items-center gap-3 uppercase tracking-tighter">
                    <div class="w-2 h-2 bg-cyan-400 rounded-full animate-ping"></div>
                    System Encoding Active...
                </div>

                <div class="mt-8 relative">
                    <textarea id="base64Output" readonly placeholder="Output buffer empty..."
                        class="w-full h-40 p-5 bg-black/60 text-cyan-500/80 font-mono text-[9px] rounded-xl border border-white/5 custom-scrollbar focus:ring-1 focus:ring-cyan-500 outline-none transition-all"></textarea>
                    
                    <button onclick="copyToClipboard()" id="copyBtn" class="absolute bottom-4 right-4 btn-neon-purple text-white px-6 py-2 rounded font-black text-[10px] uppercase tracking-tighter shadow-xl">
                        Copy Fragment
                    </button>
                </div>

                <!-- Metrics -->
                <div id="stats" class="mt-6 flex gap-4 hidden">
                    <div class="flex-1 p-3 bg-black/40 rounded-lg border-l-2 border-slate-500">
                        <span class="block text-[8px] text-slate-500 uppercase font-bold mb-1">Source Size</span>
                        <span id="origSize" class="text-xs font-bold text-slate-300">0 MB</span>
                    </div>
                    <div class="flex-1 p-3 bg-black/40 rounded-lg border-l-2 border-purple-500">
                        <span class="block text-[8px] text-purple-400 uppercase font-bold mb-1">String Size</span>
                        <span id="b64Size" class="text-xs font-bold text-purple-300">0 MB</span>
                    </div>
                </div>
            </section>

            <!-- DECODER -->
            <section class="anime-card rounded-2xl p-8">
                <div class="flex items-center gap-4 mb-8">
                    <div class="h-1 bg-purple-500 w-8"></div>
                    <h2 class="text-lg font-bold tech-font uppercase tracking-widest text-white">Decoder Core</h2>
                </div>

                <textarea id="base64Input" placeholder="Awaiting data string input..."
                    class="w-full h-20 p-4 bg-black/40 border border-white/10 rounded-xl mb-4 focus:border-purple-500 outline-none transition-all font-mono text-[9px] text-purple-300/70"></textarea>
                
                <button onclick="playBase64()" class="w-full btn-neon-purple text-white font-black py-4 rounded-xl transition-all shadow-lg text-[11px] uppercase tracking-[0.2em]">
                    EXECUTE RECONSTRUCTION
                </button>

                <div id="mediaDisplayContainer" class="mt-8 hidden">
                    <div id="videoWrapper" class="hidden">
                        <video id="videoPreview" controls class="w-full rounded-xl border border-white/10 shadow-2xl bg-black"></video>
                    </div>
                    <div id="imageWrapper" class="hidden">
                        <img id="imagePreview" class="mx-auto max-w-full rounded-xl border border-white/10 shadow-2xl">
                    </div>
                    <button onclick="clearMedia()" class="mt-6 mx-auto block text-[9px] font-black text-slate-600 hover:text-red-500 uppercase tracking-widest transition-colors">Wipe Preview Buffer</button>
                </div>
            </section>
        </div>

        <footer class="mt-16 text-center">
            <p class="text-[9px] font-bold text-slate-600 uppercase tracking-[0.5em]">
                System // <span class="text-cyan-900">StorageBase64</span> // Protocol v2.8-Neo
            </p>
        </footer>
    </div>

    <canvas id="processCanvas" class="hidden"></canvas>

    <script>
        const mediaFileInput = document.getElementById('mediaFile');
        const base64Output = document.getElementById('base64Output');
        const base64Input = document.getElementById('base64Input');
        const videoPreview = document.getElementById('videoPreview');
        const imagePreview = document.getElementById('imagePreview');
        const mediaDisplayContainer = document.getElementById('mediaDisplayContainer');
        const videoWrapper = document.getElementById('videoWrapper');
        const imageWrapper = document.getElementById('imageWrapper');
        const encoderStatus = document.getElementById('encoderStatus');
        const statsArea = document.getElementById('stats');
        const cmdDisplay = document.getElementById('cmdDisplay');
        const canvas = document.getElementById('processCanvas');
        const ctx = canvas.getContext('2d');

        function generateCmd(type) {
            const fileName = mediaFileInput.files[0] ? mediaFileInput.files[0].name : "target.mp4";
            let cmd = "";
            if (type === 'av1') {
                cmd = `ffmpeg -i "${fileName}" -c:v libaom-av1 -crf 30 -b:v 0 -strict experimental "output_av1.mp4"`;
            } else {
                cmd = `ffmpeg -i "${fileName}" -c:v libx265 -crf 28 "output_hevc.mp4"`;
            }
            cmdDisplay.textContent = cmd;
            cmdDisplay.classList.remove('hidden');
        }

        mediaFileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            if (!cmdDisplay.classList.contains('hidden')) {
                generateCmd(cmdDisplay.textContent.includes('av1') ? 'av1' : 'hevc');
            }

            encoderStatus.classList.remove('hidden');
            base64Output.value = '';
            statsArea.classList.add('hidden');

            if (file.type.startsWith('image/') && document.getElementById('optimizeImage').checked) {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    const webpBase64 = canvas.toDataURL('image/webp', 0.8);
                    finishEncoding(file.size, webpBase64);
                    URL.revokeObjectURL(img.src);
                };
            } else {
                const reader = new FileReader();
                reader.onload = (event) => finishEncoding(file.size, event.target.result);
                reader.readAsDataURL(file);
            }
        });

        function finishEncoding(origByteSize, resultBase64) {
            base64Output.value = resultBase64;
            const originalSizeMB = (origByteSize / (1024 * 1024)).toFixed(2);
            const b64SizeMB = (resultBase64.length / (1024 * 1024)).toFixed(2);
            document.getElementById('origSize').textContent = originalSizeMB + ' MB';
            document.getElementById('b64Size').textContent = b64SizeMB + ' MB';
            encoderStatus.classList.add('hidden');
            statsArea.classList.remove('hidden');
        }

        function playBase64() {
            const data = base64Input.value.trim();
            if (!data) return;
            mediaDisplayContainer.classList.remove('hidden');
            videoWrapper.classList.add('hidden');
            imageWrapper.classList.add('hidden');
            if (data.startsWith('data:video')) {
                videoPreview.src = data;
                videoWrapper.classList.remove('hidden');
                videoPreview.play().catch(e => console.error(e));
            } else if (data.startsWith('data:image')) {
                imagePreview.src = data;
                imageWrapper.classList.remove('hidden');
            }
            mediaDisplayContainer.scrollIntoView({ behavior: 'smooth' });
        }

        function copyToClipboard() {
            const text = base64Output.value;
            if (!text) return;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            const btn = document.getElementById('copyBtn');
            btn.textContent = 'DONE';
            setTimeout(() => btn.textContent = 'Copy Fragment', 2000);
        }

        function clearMedia() {
            videoPreview.pause();
            videoPreview.src = "";
            imagePreview.src = "";
            mediaDisplayContainer.classList.add('hidden');
            base64Input.value = "";
        }
    </script>
</body>
</html>
